<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anich Cakes — натуральные десерты без сахара</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/typography.css">
</head>
<body>
  <main class="page">

    <section class="hero-banner" aria-label="Hero image">
      <div class="hero-banner__image">
        <img src="img/berry_header.jpg" alt="Berry dessert background">
      </div>
      <header class="hero-banner__header">
        <img class="hero-banner__logo" src="img/burger.svg" alt="menu">
        <h1 class="hero-banner__title">Anich Cakes</h1>
      </header>
    </section>

    <section class="intro">
      <div class="intro__inner">
        <h1 class="intro__title">Десерты с гибким составом</h1>
        <p class="intro__text">Тут вы можете выбрать десерт под любые предпочтения и диеты</p>
      </div>
    </section>

    <section class="products">
      <div class="products__grid">
        <article class="product-card">
          <img class="product-card__img" src="img/card-img-1.jpg" alt="">
          <div class="product-card__body">
            <div class="product-card__title">Berry</div>
            <div class="product-card__description">Фруктовый микс</div>
            <button class="product-card__button" type="button">Выбрать</button>
          </div>
        </article>
        <article class="product-card">
          <img class="product-card__img" src="img/card-img-2.jpg" alt="">
          <div class="product-card__body">
            <div class="product-card__title">Choco</div>
            <div class="product-card__description">Шоколадный десерт</div>
            <button class="product-card__button" type="button">Выбрать</button>
          </div>
        </article>
        <article class="product-card">
          <img class="product-card__img" src="img/card-img-3.jpg" alt="">
          <div class="product-card__body">
            <div class="product-card__title">Nut</div>
            <div class="product-card__description">Ореховая смесь</div>
            <button class="product-card__button" type="button">Выбрать</button>
          </div>
        </article>
        <article class="product-card">
          <img class="product-card__img" src="img/card-img-4.jpg" alt="">
          <div class="product-card__body">
            <div class="product-card__title">Coco</div>
            <div class="product-card__description">Кокосовая нуга</div>
            <button class="product-card__button" type="button">Выбрать</button>
          </div>
        </article>
        <article class="product-card">
          <img class="product-card__img" src="img/card-img-5.jpg" alt="">
          <div class="product-card__body">
            <div class="product-card__title">Mint</div>
            <div class="product-card__description">Мятный шейк</div>
            <button class="product-card__button" type="button">Выбрать</button>
          </div>
        </article>
        <article class="product-card">
          <img class="product-card__img" src="img/card-img-6.jpg" alt="">
          <div class="product-card__body">
            <div class="product-card__title">Vanilla</div>
            <div class="product-card__description">Нежная ваниль</div>
            <button class="product-card__button" type="button">Выбрать</button>
          </div>
        </article>
      </div>
    </section>

    <footer class="footer">
      <span class="footer__brand">Anich Cakes</span>
      <span>Тортики</span>
    </footer>
  </main>
</body>
</html>
